name: Weekly AI Security Digest

on:
  schedule:
    - cron: "0 14 * * 1" # Every Monday at 6 AM PST (14:00 UTC)
  workflow_dispatch: # Manual trigger for testing

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python -m outwire.main --dry-run

      - name: Commit digest and state
        run: |
          git config user.name "outwire-bot"
          git config user.email "actions@github.com"
          git add state/seen_articles.json output/last_digest.md output/last_digest.html
          git diff --staged --quiet || git commit -m "chore: weekly digest generated [skip ci]"
          git push

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: output/last_digest.md
          retention-days: 30
          if-no-files-found: ignore
